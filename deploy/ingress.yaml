apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: northscope
  namespace: northscope
  annotations:
    # Requires ExternalDNS or a similar DNS controller in the cluster.
    # Change this hostname before applying.
    external-dns.alpha.kubernetes.io/hostname: northscope.example.com
spec:
  # Change this to your cluster's ingress class, for example: nginx, haproxy, traefik.
  ingressClassName: nginx
  rules:
    - host: northscope.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: northscope
                port:
                  name: http
