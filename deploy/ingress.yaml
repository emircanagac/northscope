apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: northscope
  namespace: northscope
spec:
  # Change this to your cluster's ingress class, for example: nginx, haproxy, traefik.
  ingressClassName: nginx
  rules:
    - host: northscope.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: northscope
                port:
                  name: http
