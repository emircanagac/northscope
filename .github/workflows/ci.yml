name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Prepare embedded UI fixture
        run: |
          mkdir -p ui/dist
          printf '<!doctype html><title>NorthScope test fixture</title>\n' > ui/dist/index.html

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Race detector
        run: go test -race ./internal/k8s ./internal/server

  helm:
    name: Helm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Lint chart
        run: helm lint charts/northscope

      - name: Render default chart
        run: helm template northscope charts/northscope > /dev/null

      - name: Render production options
        run: |
          helm template northscope charts/northscope \
            --set ingress.enabled=true \
            --set ingress.className=nginx \
            --set ingress.hosts[0].host=northscope.example.com \
            --set networkPolicy.enabled=true \
            --set replicaCount=2 \
            --set podDisruptionBudget.enabled=true \
            > /dev/null

  browser:
    name: Browser E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser tests
        run: npm run test:e2e

      - name: Upload browser diagnostics
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: |
            ui/playwright-report/
            ui/test-results/
          if-no-files-found: ignore
          retention-days: 7

  container:
    name: Container Build
    if: github.event_name == 'pull_request' || !startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime
          push: false
          tags: northscope:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    name: Publish Container
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - go
      - helm
      - browser
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/emircanagac/northscope
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
