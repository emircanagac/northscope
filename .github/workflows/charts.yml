name: Helm Charts

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Publish Helm chart
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Validate release version alignment
        run: |
          release_version="${GITHUB_REF_NAME#v}"
          chart_version="$(awk '/^version:/ {print $2; exit}' charts/northscope/Chart.yaml | tr -d '"')"
          app_version="$(awk '/^appVersion:/ {print $2; exit}' charts/northscope/Chart.yaml | tr -d '"')"
          image_tag="$(awk '/^image:/ {in_image=1; next} in_image && /^  tag:/ {print $2; exit}' charts/northscope/values.yaml | tr -d '"')"

          if [ "$chart_version" != "$release_version" ]; then
            echo "Chart version $chart_version does not match tag $release_version"
            exit 1
          fi

          if [ "$app_version" != "$release_version" ]; then
            echo "Chart appVersion $app_version does not match tag $release_version"
            exit 1
          fi

          if [ "$image_tag" != "$release_version" ]; then
            echo "Default image tag $image_tag does not match tag $release_version"
            exit 1
          fi

      - name: Package chart
        run: |
          mkdir -p .helm-repo
          helm lint charts/northscope
          helm package charts/northscope --destination .helm-repo

      - name: Merge existing chart index
        run: |
          if git ls-remote --exit-code --heads origin gh-pages; then
            git fetch origin gh-pages --depth=1
            git show origin/gh-pages:index.yaml > .helm-repo/index.yaml || true
          fi
          helm repo index .helm-repo \
            --url https://emircanagac.github.io/northscope \
            --merge .helm-repo/index.yaml

      - name: Add chart repository landing page
        run: |
          release_version="${GITHUB_REF_NAME#v}"
          cat > .helm-repo/index.html <<EOF
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>NorthScope Helm Chart Repository</title>
            <style>
              body {
                max-width: 760px;
                margin: 48px auto;
                padding: 0 20px;
                color: #0f172a;
                font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                line-height: 1.55;
              }
              code, pre {
                border-radius: 8px;
                background: #f1f5f9;
              }
              pre {
                padding: 16px;
                overflow-x: auto;
              }
              a {
                color: #2563eb;
              }
            </style>
          </head>
          <body>
            <h1>NorthScope Helm Chart Repository</h1>
            <p>Read-only Kubernetes Ingress topology debugger.</p>
            <pre><code>helm repo add northscope https://emircanagac.github.io/northscope
          helm repo update
          helm upgrade --install northscope northscope/northscope \
            --version ${release_version} \
            --namespace northscope \
            --create-namespace</code></pre>
            <p><a href="https://github.com/emircanagac/northscope">GitHub repository</a></p>
          </body>
          </html>
          EOF

      - name: Publish chart repository
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .helm-repo
          keep_files: true
          enable_jekyll: false

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" .helm-repo/northscope-*.tgz \
            --verify-tag \
            --title "NorthScope $GITHUB_REF_NAME" \
            --notes "Versioned NorthScope container image and Helm chart release."
