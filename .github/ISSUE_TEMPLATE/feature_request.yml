name: Feature request
description: Suggest a topology, UI, install, or debugging improvement
title: "feature: "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What debugging workflow is hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should NorthScope show or do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Topology
        - UI
        - Helm / install
        - Kubernetes watcher
        - Gateway API
        - Documentation
        - Other
  - type: textarea
    id: examples
    attributes:
      label: Example scenario
      description: Share sanitized Kubernetes examples, screenshots, or expected graph shape.
