replicaCount: 1

image:
  repository: ghcr.io/emircanagac/northscope
  tag: 0.1.3
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: northscope.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

networkPolicy:
  enabled: false
  ingress:
    from: []
  egress:
    enabled: false
    rules: []

podDisruptionBudget:
  enabled: false
  minAvailable: 1
  maxUnavailable: ""

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}

extraArgs: []
