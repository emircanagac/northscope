# NorthScope rich demo topology.
#
# Apply:
#   kubectl apply -f examples/demo-topology.yaml
#
# Remove:
#   kubectl delete -f examples/demo-topology.yaml
#
# This manifest is for UI screenshots and topology validation. The demo ingress
# controllers are lightweight placeholder workloads; they are not intended to
# serve production ingress traffic. Apply it after installing NorthScope because
# all namespaced resources are created in the existing northscope namespace.
---
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: demo-nginx
spec:
  controller: k8s.io/demo-nginx
---
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: demo-haproxy
spec:
  controller: haproxy.org/demo-ingress-controller
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-nginx-ingress-controller
  namespace: northscope
  labels:
    app.kubernetes.io/name: demo-nginx-ingress-controller
    app.kubernetes.io/component: ingress-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-nginx-ingress-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-nginx-ingress-controller
        app.kubernetes.io/component: ingress-controller
    spec:
      containers:
        - name: controller
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: demo-nginx-ingress-controller
  namespace: northscope
  labels:
    app.kubernetes.io/name: demo-nginx-ingress-controller
    app.kubernetes.io/component: ingress-controller
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: demo-nginx-ingress-controller
  ports:
    - name: http
      port: 80
      targetPort: http
    - name: https
      port: 443
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-haproxy-ingress-controller
  namespace: northscope
  labels:
    app.kubernetes.io/name: demo-haproxy-ingress-controller
    app.kubernetes.io/component: ingress-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-haproxy-ingress-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-haproxy-ingress-controller
        app.kubernetes.io/component: ingress-controller
    spec:
      containers:
        - name: controller
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: demo-haproxy-ingress-controller
  namespace: northscope
  labels:
    app.kubernetes.io/name: demo-haproxy-ingress-controller
    app.kubernetes.io/component: ingress-controller
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: demo-haproxy-ingress-controller
  ports:
    - name: http
      port: 80
      targetPort: http
    - name: https
      port: 443
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: northscope
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
    spec:
      containers:
        - name: app
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: northscope
spec:
  selector:
    app.kubernetes.io/name: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: northscope
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
    spec:
      containers:
        - name: app
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: northscope
spec:
  selector:
    app.kubernetes.io/name: api
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout
  namespace: northscope
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: checkout
  template:
    metadata:
      labels:
        app.kubernetes.io/name: checkout
    spec:
      containers:
        - name: app
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: checkout
  namespace: northscope
spec:
  selector:
    app.kubernetes.io/name: checkout
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: northscope
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: admin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: admin
    spec:
      containers:
        - name: app
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: admin
  namespace: northscope
spec:
  selector:
    app.kubernetes.io/name: admin
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: northscope
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
    spec:
      containers:
        - name: app
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: northscope
spec:
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reports
  namespace: northscope
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: reports
  template:
    metadata:
      labels:
        app.kubernetes.io/name: reports
    spec:
      containers:
        - name: app
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: reports
  namespace: northscope
spec:
  selector:
    app.kubernetes.io/name: reports
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: external-legacy
  namespace: northscope
spec:
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: external-legacy-manual
  namespace: northscope
  labels:
    kubernetes.io/service-name: external-legacy
addressType: IPv4
ports:
  - name: http
    protocol: TCP
    port: 8080
endpoints:
  - addresses:
      - 192.0.2.45
    conditions:
      ready: true
      serving: true
      terminating: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zero-ready
  namespace: northscope
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zero-ready
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zero-ready
    spec:
      containers:
        - name: app
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /not-ready
              port: http
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: zero-ready
  namespace: northscope
spec:
  selector:
    app.kubernetes.io/name: zero-ready
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: store
  namespace: northscope
spec:
  ingressClassName: demo-nginx
  rules:
    - host: shop.demo.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  name: http
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  name: http
          - path: /checkout
            pathType: Prefix
            backend:
              service:
                name: checkout
                port:
                  name: http
    - host: admin.demo.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin
                port:
                  name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ops
  namespace: northscope
spec:
  ingressClassName: demo-haproxy
  rules:
    - host: ops.demo.localhost
      http:
        paths:
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  name: http
          - path: /reports
            pathType: Prefix
            backend:
              service:
                name: reports
                port:
                  name: http
          - path: /legacy
            pathType: Prefix
            backend:
              service:
                name: external-legacy
                port:
                  name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: broken
  namespace: northscope
spec:
  ingressClassName: demo-nginx
  rules:
    - host: broken.demo.localhost
      http:
        paths:
          - path: /missing-service
            pathType: Prefix
            backend:
              service:
                name: missing-service
                port:
                  name: http
          - path: /zero-ready
            pathType: Prefix
            backend:
              service:
                name: zero-ready
                port:
                  name: http
